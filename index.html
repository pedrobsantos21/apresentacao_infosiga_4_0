document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

off2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Open Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"570c48c7-6bee-4eaa-9b86-d1de5bd6ba55\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* fallback */\n@font-face {\n  font-family: 'Material Icons';\n  font-style: normal;\n  font-weight: 400;\n  src: url(\"1fd3618c-9499-4cdb-80d3-82b230a5251b\") format('woff2');\n}\n\n.material-icons {\n  font-family: 'Material Icons';\n  font-weight: normal;\n  font-style: normal;\n  font-size: 24px;\n  line-height: 1;\n  letter-spacing: normal;\n  text-transform: none;\n  display: inline-block;\n  white-space: nowrap;\n  word-wrap: normal;\n  direction: ltr;\n  -webkit-font-feature-settings: 'liga';\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<!-- Detran-SP design system tokens -->\n<style>/* ============================================================\n   Detran-SP — Color tokens\n   Base palette (raw values) + semantic aliases (intent).\n   Reference semantic aliases in components; reserve base\n   values for defining the aliases.\n   ============================================================ */\n:root {\n  /* ---- Base palette ---------------------------------------- */\n\n  /* Institutional blue — the spine of the brand */\n  --blue-700: #004A93;   /* deep / pressed */\n  --blue-600: #0058AF;   /* primary */\n  --blue-400: #3291D1;   /* secondary / accent */\n  --blue-100: #C2E0F4;   /* soft surface / focus ring tint */\n  --blue-50:  #E6F0FC;   /* lightest surface wash */\n\n  /* Ink — text neutrals (cool gray, never pure black) */\n  --ink-900: #111414;    /* headings */\n  --ink-700: #3A3F51;    /* body */\n  --ink-600: #57595A;    /* muted */\n  --ink-400: #81889B;    /* subtle / placeholder */\n\n  /* Surface & line neutrals */\n  --white:    #FFFFFF;\n  --gray-100: #ECF0F1;   /* page / muted surface */\n  --gray-150: #EAECEE;   /* light hairline */\n  --gray-300: #D3D8DB;   /* default border */\n  --gray-350: #C7CDD1;   /* strong border */\n\n  /* Status */\n  --green-600: #1E8E3E;  /* success */\n  --amber-700: #C77700;  /* warning */\n  --red-700:   #C5221F;  /* error / danger */\n\n  /* ---- Semantic aliases ------------------------------------ */\n\n  /* Brand */\n  --brand-primary:       var(--blue-600);\n  --brand-primary-hover: var(--blue-700);\n  --brand-secondary:     var(--blue-400);\n  --brand-surface:       var(--blue-50);\n  --brand-surface-soft:  var(--blue-100);\n\n  /* Text */\n  --text-heading: var(--ink-900);\n  --text-body:    var(--ink-700);\n  --text-muted:   var(--ink-600);\n  --text-subtle:  var(--ink-400);\n  --text-on-brand: var(--white);\n\n  /* Surfaces */\n  --surface:        var(--white);\n  --surface-muted:  var(--gray-100);\n  --surface-brand:  var(--blue-50);\n\n  /* Borders */\n  --border:        var(--gray-300);\n  --border-strong: var(--gray-350);\n  --border-light:  var(--gray-150);\n\n  /* Feedback */\n  --success: var(--green-600);\n  --warning: var(--amber-700);\n  --error:   var(--red-700);\n\n  /* Focus ring */\n  --focus-ring: var(--brand-surface-soft);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Detran-SP — Typography tokens\n   Single family (Open Sans). Headings lean light/regular at\n   large sizes; UI & emphasis use 600. Scale is rem-based.\n   ============================================================ */\n:root {\n  /* Family */\n  --font-sans: \"Open Sans\", Helvetica, Arial, sans-serif;\n  --font-family-base: var(--font-sans);\n\n  /* Weights */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* Type scale (px values shown for reference) */\n  --text-display: 48px;  /* hero / display */\n  --text-h1:      40px;\n  --text-h2:      32px;\n  --text-h3:      24px;\n  --text-h4:      20px;\n  --text-body-lg: 18px;\n  --text-base:    16px;  /* default body & controls */\n  --text-sm:      14px;\n  --text-xs:      13px;\n  --text-overline: 14px; /* uppercase section labels */\n\n  /* Line heights */\n  --leading-tight:  1.1;\n  --leading-snug:   1.25;\n  --leading-normal: 1.45;\n  --leading-relaxed: 1.6;\n\n  /* Letter spacing */\n  --tracking-overline: 1.2px;  /* uppercase eyebrow labels */\n  --tracking-tight: -0.01em;\n}\n<\u002Fstyle>\n<script src=\"34b62ce6-9fce-449e-84ea-734761551655\"><\u002Fscript>\n<style>\n  :root{\n    /* Mapped to official Detran-SP tokens */\n    --fg:    var(--blue-600);   /* #0058AF institutional primary */\n    --dark:  var(--blue-700);   /* #004A93 deep / pressed */\n    --lt:    var(--blue-100);   /* #C2E0F4 soft surface */\n    --ltsoft:var(--blue-50);    /* #E6F0FC lightest wash */\n    --paper: var(--gray-100);   /* #ECF0F1 page surface */\n    --ink:   var(--ink-900);    /* #111414 headings */\n    --body:  var(--ink-700);    /* #3A3F51 body */\n    --muted: var(--ink-600);    /* #57595A muted */\n    --line:  var(--gray-300);   /* #D3D8DB default border */\n\n    /* type scale (1920x1080) */\n    --type-eyebrow:  22px;\n    --type-title:    72px;\n    --type-subtitle: 44px;\n    --type-body:     30px;\n    --type-small:    24px;\n    --type-mono:     22px;\n    --type-mega:    220px;\n\n    /* spacing */\n    --pad-top:     96px;\n    --pad-bottom:  96px;\n    --pad-x:      120px;\n    --gap-title:   48px;\n    --gap-item:    28px;\n  }\n\n  html,body{background:#0a1320;}\n  body{font-family:var(--font-sans, 'Open Sans', Helvetica, Arial, sans-serif); color:var(--body); margin:0;}\n  strong, b{ font-weight:600; }\n\n  /* ---------- shared slide chrome ---------- */\n  .slide{\n    box-sizing:border-box;\n    width:100%; height:100%;\n    background:#fff;\n    color:var(--ink);\n    position:relative;\n    overflow:hidden;\n    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);\n    display:flex; flex-direction:column;\n  }\n  .slide.dark{ background:var(--dark); color:#fff; }\n  .slide.blue{ background:var(--fg); color:#fff; }\n  .slide.paper{ background:var(--paper); }\n\n  /* top accent bar (matches brand styles.css) */\n  .topbar{\n    position:absolute; top:0; left:0; right:0; height:6px;\n    background: linear-gradient(90deg, var(--dark) 0%, var(--fg) 55%, var(--lt) 100%);\n  }\n  .slide.dark .topbar,\n  .slide.blue .topbar{\n    background: linear-gradient(90deg, #fff 0%, var(--lt) 55%, var(--lt) 100%);\n    opacity:.85;\n  }\n\n  /* slide footer */\n  .footer{\n    position:absolute; left: var(--pad-x); right: var(--pad-x); bottom:42px;\n    display:flex; justify-content:space-between; align-items:center;\n    font-size:18px; letter-spacing:.06em; text-transform:uppercase;\n    color:var(--muted); font-weight:600;\n  }\n  .slide.dark .footer, .slide.blue .footer{ color:rgba(255,255,255,.65); }\n  .footer .brand{ display:flex; align-items:center; gap:14px; }\n  .footer .brand::before{\n    content:\"\"; width:10px; height:10px; background:var(--fg); border-radius:50%;\n  }\n  .slide.dark .footer .brand::before,\n  .slide.blue .footer .brand::before{ background:var(--lt); }\n\n  /* eyebrow + title common */\n  .eyebrow{\n    font-size: 24px;\n    font-weight:500; text-transform:uppercase; letter-spacing:.18em;\n    color:var(--muted);\n    margin:0 0 var(--gap-item);\n    display:inline-flex; align-items:center; gap:14px;\n  }\n  .eyebrow::before{\n    content:\"\"; width:42px; height:3px; background:var(--fg);\n  }\n  .slide.dark .eyebrow, .slide.blue .eyebrow{ color:var(--lt); }\n  .slide.dark .eyebrow::before, .slide.blue .eyebrow::before{ background:var(--lt); }\n\n  .title{\n    font-size: var(--type-title);\n    font-weight:600; line-height:1.04;\n    margin:0 0 var(--gap-title);\n    color:var(--dark);\n    letter-spacing:-.02em;\n    text-wrap:balance;\n    max-width: 1500px;\n  }\n  .slide.dark .title, .slide.blue .title{ color:#fff; }\n\n  .subtitle{\n    font-size: var(--type-subtitle);\n    font-weight:400; line-height:1.2;\n    color:var(--ink);\n    margin:0 0 var(--gap-title);\n    max-width: 1400px;\n  }\n  .slide.dark .subtitle, .slide.blue .subtitle{ color:rgba(255,255,255,.92); }\n\n  .body{\n    font-size: var(--type-body);\n    line-height:1.45;\n    color:var(--ink);\n  }\n  .slide.dark .body, .slide.blue .body{ color:rgba(255,255,255,.92); }\n\n  .mono{ font-family:'IBM Plex Mono', ui-monospace, monospace; font-size: var(--type-mono); }\n\n  /* ---------- SLIDE 1 — capa ---------- */\n  .cover{\n    background:\n      radial-gradient(1200px 800px at 85% 110%, rgba(50,145,209,.45), transparent 60%),\n      radial-gradient(900px 700px at 10% -10%, rgba(194,224,244,.16), transparent 60%),\n      linear-gradient(180deg, #0058AF 0%, #004A93 100%);\n    color:#fff;\n    padding-top: 140px;\n  }\n  .cover .grid-bg{\n    position:absolute; inset:0;\n    background-image:\n      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);\n    background-size: 80px 80px;\n    mask-image: radial-gradient(ellipse at 70% 60%, #000 30%, transparent 75%);\n    pointer-events:none;\n  }\n  .cover .mark{\n    display:flex; align-items:center; gap:18px;\n    font-size:24px; letter-spacing:.16em; text-transform:uppercase; font-weight:600;\n    color:var(--lt);\n    margin-bottom: 80px;\n  }\n  .cover .mark .dot{ width:14px; height:14px; background:var(--lt); border-radius:50%; box-shadow:0 0 0 6px rgba(194,224,244,.18); }\n  .cover .versiontag{\n    display:inline-flex; align-items:center; gap:14px;\n    font-family:'IBM Plex Mono', monospace; font-size:24px;\n    color:var(--lt); margin-bottom: 36px;\n    padding: 10px 22px;\n    border:1px solid rgba(194,224,244,.4);\n    border-radius:999px;\n    background: rgba(194,224,244,.08);\n    width:max-content;\n  }\n  .cover h1{\n    font-size: 200px;\n    font-weight:600;\n    line-height:.92;\n    letter-spacing:-.04em;\n    margin:0 0 40px;\n    color:#fff;\n  }\n  .cover h1 .v{\n    color: var(--lt);\n    font-weight:300;\n  }\n  .cover .tagline{\n    font-size: 48px;\n    font-weight:300;\n    line-height:1.25;\n    max-width: 1300px;\n    color: rgba(255,255,255,.92);\n    margin:0 0 60px;\n  }\n  .cover .tagline strong{ font-weight:600; color:#fff; }\n  .cover .meta{\n    position:absolute; left: var(--pad-x); bottom: 90px;\n    display:flex; gap:80px; align-items:flex-end;\n    font-size:24px; color:rgba(255,255,255,.7);\n  }\n  .cover .meta .lbl{\n    display:block; font-size:24px; letter-spacing:.18em; text-transform:uppercase;\n    color: var(--lt); font-weight:600; margin-bottom:12px;\n  }\n  .cover .meta .val{ font-size:24px; color:#fff; font-weight:600; line-height:1.35; }\n\n  /* ---------- SLIDE 2 — Infosiga hoje ---------- */\n  .two-col{\n    display:grid;\n    grid-template-columns: 1.05fr 1fr;\n    gap: 80px;\n    flex:1;\n    align-items:flex-start;\n  }\n  .stat-grid{\n    display:grid; grid-template-columns: 1fr 1fr; gap: 28px;\n    margin-top: 12px;\n  }\n  .stat{\n    border:1px solid var(--line);\n    border-radius: 12px;\n    padding: 22px 24px;\n    background:#fff;\n  }\n  .stat .n{\n    font-size: 56px; font-weight:600; color:var(--fg); line-height:1; letter-spacing:-.02em;\n  }\n  .stat .l{\n    font-size: 24px; color:var(--muted); margin-top:10px; line-height:1.35;\n  }\n  .feat-list{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:18px; }\n  .feat-list li{\n    display:flex; gap:18px; align-items:flex-start;\n    font-size: 24px; line-height:1.35;\n  }\n  .feat-list .ico{\n    width:42px; height:42px; flex-shrink:0;\n    background: var(--ltsoft); color:var(--fg);\n    border-radius:10px; display:flex; align-items:center; justify-content:center;\n    font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:18px;\n    margin-top:4px;\n  }\n  .feat-list strong{ color:var(--dark); font-weight:600; }\n\n  /* ---------- SLIDE 3 — o desafio (big number) ---------- */\n  .meta-target{\n    display:grid; grid-template-columns: .9fr 1.1fr; gap: 100px; flex:1; align-items:center;\n  }\n  .meganum{\n    font-size: 320px;\n    font-weight:600;\n    line-height:.85;\n    color: var(--lt);\n    letter-spacing: -.05em;\n    font-feature-settings: \"tnum\";\n  }\n  .meganum .unit{ font-size:48px; color:rgba(255,255,255,.7); font-weight:500; letter-spacing:0; display:block; margin-top:24px; line-height:1.3; max-width: 480px;}\n  .target-side h2{\n    font-size: 64px; font-weight:600; line-height:1.05; color:#fff; margin:0 0 30px; letter-spacing:-.02em;\n  }\n  .target-side p{\n    font-size: 28px; line-height:1.5; color:rgba(255,255,255,.85); margin:0 0 24px; max-width: 700px;\n  }\n  .target-side .source{\n    margin-top: 32px; padding-top: 24px; border-top:1px solid rgba(255,255,255,.18);\n    font-size: 18px; letter-spacing:.08em; text-transform:uppercase; color:var(--lt); font-weight:600;\n  }\n\n  /* ---------- SLIDE 4 — mandato legal ---------- */\n  .mandate-stack{\n    display:grid; grid-template-columns: 1fr 1fr; gap: 40px; flex:1;\n    grid-template-rows: 1fr;\n  }\n  .mandate-card{\n    border:1px solid var(--line);\n    border-radius: 12px;\n    padding: 40px 44px;\n    background:#fff;\n    display:flex; flex-direction:column;\n    position:relative;\n    overflow:hidden;\n  }\n  .mandate-card .tag{\n    font-size:20px; letter-spacing:.14em; text-transform:uppercase; font-weight:500;\n    color: var(--muted); margin-bottom: 18px;\n  }\n  .mandate-card h3{\n    font-size: 46px; line-height:1.12; color:var(--dark); font-weight:600; margin:0 0 24px; letter-spacing:-.01em;\n  }\n  .mandate-card p{ font-size:26px; line-height:1.55; color:var(--ink); margin:0; }\n  .mandate-card .pillar{\n    margin-top:auto;\n    padding-top: 28px;\n    border-top:1px solid var(--line);\n    font-size: 22px; color:var(--muted); letter-spacing:.03em;\n  }\n  .mandate-card .pillar strong{ color:var(--dark); }\n  .mandate-card::after{\n    content:\"\"; position:absolute; right:-50px; top:-50px;\n    width:160px; height:160px; border-radius:50%;\n    background: var(--ltsoft);\n    z-index:0;\n  }\n  .mandate-card > *{ position:relative; z-index:1; }\n\n  /* ---------- SLIDE 5 — visão 4 camadas ---------- */\n  .layers-stage{\n    display:grid; grid-template-columns: repeat(4, 1fr); gap: 28px; flex:1; align-content:stretch;\n  }\n  .layer-card{\n    border:1px solid var(--line);\n    border-radius: 12px;\n    padding: 36px 32px 32px;\n    background:#fff;\n    display:flex; flex-direction:column;\n    position:relative;\n  }\n  .layer-card .lnum{\n    font-family:'IBM Plex Mono', monospace; font-size:20px; color:var(--muted);\n    letter-spacing:.08em;\n    margin-bottom: 20px;\n  }\n  .layer-card h3{\n    font-size: 34px; color:var(--dark); font-weight:600; line-height:1.1; margin:0 0 16px; letter-spacing:-.01em;\n  }\n  .layer-card p{ font-size:20px; color:var(--ink); line-height:1.45; margin:0 0 20px; }\n  .layer-card .bullets{ list-style:none; padding:0; margin: auto 0 0; display:flex; flex-direction:column; gap:8px; }\n  .layer-card .bullets li{ font-size:17px; color:var(--muted); line-height:1.35; padding-left:18px; position:relative; }\n  .layer-card .bullets li::before{ content:\"\"; position:absolute; left:0; top:9px; width:8px; height:2px; background: var(--fg); }\n  .layer-card.featured{\n    background: var(--dark); color:#fff; border-color: var(--dark);\n  }\n  .layer-card.featured h3{ color:#fff; }\n  .layer-card.featured p{ color:rgba(255,255,255,.92); }\n  .layer-card.featured .lnum{ color:var(--lt); }\n  .layer-card.featured .bullets li{ color:rgba(255,255,255,.8); }\n  .layer-card.featured .bullets li::before{ background: var(--lt); }\n\n  .flow-strip{\n    margin-top: 36px;\n    border-top:1px solid var(--line);\n    padding-top: 24px;\n    display:flex; align-items:center; gap:18px; flex-wrap:wrap;\n    font-family:'IBM Plex Mono', monospace; font-size:18px;\n    color:var(--muted); letter-spacing:.04em;\n  }\n  .flow-strip .step{ color:var(--dark); font-weight:500; }\n  .flow-strip .arr{ color:var(--muted); }\n\n  /* ---------- camada detail slides ---------- */\n  .layer-hero{\n    display:grid; grid-template-columns: 1fr 1.4fr; gap: 80px; flex:1; align-items:center;\n  }\n  .layer-hero .sidemark{\n    border-left: 4px solid var(--fg);\n    padding-left: 28px;\n  }\n  .layer-hero .sidemark .num{\n    font-family:'IBM Plex Mono', monospace; font-size:22px; color:var(--muted); letter-spacing:.1em;\n    font-weight:500;\n  }\n  .layer-hero .sidemark h2{\n    font-size: 72px; font-weight:600; color:var(--dark); line-height:1; margin: 16px 0 24px; letter-spacing:-.02em;\n  }\n  .layer-hero .sidemark p{\n    font-size: 22px; color: var(--muted); line-height:1.5; margin:0;\n  }\n  .layer-hero .sidemark .align{\n    margin-top: 32px;\n    padding: 14px 18px;\n    background: var(--ltsoft);\n    border-radius: 10px;\n    font-size: 17px; color: var(--dark); line-height:1.4;\n  }\n  .layer-hero .sidemark .align strong{ color:var(--dark); letter-spacing:.06em; text-transform:uppercase; font-size:14px; display:block; margin-bottom:6px; }\n\n  .deliv-list{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:32px; }\n  .deliv{\n    border:1px solid var(--line);\n    border-radius: 12px;\n    padding: 28px 32px;\n    background:#fff;\n    display:grid; grid-template-columns: 64px 1fr; gap:24px; align-items:flex-start;\n  }\n  .deliv .dn{\n    font-family:'IBM Plex Mono', monospace; font-size:18px; font-weight:600;\n    background: var(--fg); color:#fff;\n    width:48px; height:48px; border-radius:10px;\n    display:flex; align-items:center; justify-content:center;\n    letter-spacing:.04em;\n  }\n  .deliv h4{ font-size: 30px; color:var(--dark); font-weight:600; margin:0 0 10px; line-height:1.2; }\n  .deliv p{ font-size: 22px; color:var(--ink); line-height:1.5; margin:0; }\n\n  /* ---------- camada 2 bases grid ---------- */\n  .bases{\n    display:grid; grid-template-columns: 1fr 1fr; gap: 24px; flex:1; align-content:start;\n  }\n  .bases .block{\n    border:1px solid var(--line); border-radius: 12px; padding: 24px 28px 22px;\n    background:#fff;\n  }\n  .bases .block h4{\n    font-size: 22px; color:var(--muted); font-weight:500; margin:0 0 14px;\n    letter-spacing:.04em; text-transform:uppercase;\n    display:flex; align-items:center; gap:12px;\n  }\n  .bases .block h4 .material-icons{ font-size:24px; }\n  .source-row{\n    display:flex; flex-wrap:wrap; gap:10px;\n    margin-top:8px;\n  }\n  .src{\n    display:inline-flex; align-items:center; gap:10px;\n    border:1px solid var(--line);\n    border-radius: 999px;\n    padding: 10px 18px;\n    font-size: 18px; color:var(--dark); font-weight:500;\n    background:#fff;\n  }\n  .src .acronym{\n    font-family:'IBM Plex Mono', monospace;\n    color:var(--fg); font-weight:500; letter-spacing:.04em;\n  }\n  .src small{ color:var(--muted); font-weight:400; font-size:14px; }\n  .bases .block.dark-block{ background:var(--dark); border-color:var(--dark); color:#fff; }\n  .bases .block.dark-block h4{ color:var(--lt); }\n  .bases .block.dark-block .src{ background:rgba(255,255,255,.06); border-color:rgba(194,224,244,.3); color:#fff; }\n  .bases .block.dark-block .src .acronym{ color:var(--lt); }\n  .bases .block.dark-block .src small{ color:rgba(255,255,255,.6); }\n\n  /* ---------- camada 3 — preditiva ---------- */\n  .pred-stage{\n    display:grid; grid-template-columns: 1.05fr 1fr; gap: 70px; flex:1; align-items:center;\n  }\n  .pred-text h3{\n    font-size: ar(--fg);\n  }\n  .map-ask .q{\n    font-size: 18px; color:var(--ink); font-weight:500;\n  }\n  .map-ask .cursor{\n    width:2px; height:20px; background:var(--fg); margin-left:2px;\n    display:inline-block; vertical-align:middle;\n  }\n  .map-ask .send{\n    margin-left:auto; flex-shrink:0;\n    width:38px; height:38px; border-radius:50%;\n    background:var(--fg); color:#fff;\n    display:flex; align-items:center; justify-content:center;\n  }\n\n  .map-side h3{\n    font-size: 40px; color:var(--dark); font-weight:600; line-height:1.15; margin:0 0 16px; letter-spacing:-.01em;\n  }\n  .map-side .bullet{\n    display:grid; grid-template-columns: 40px 1fr; gap:20px;\n    padding: 18px 0;\n    border-bottom: 1px solid var(--line);\n  }\n  .map-side .bullet:last-child{ border-bottom:0; }\n  .map-side .bullet .icon{\n    width:40px; height:40px; border-radius:10px;\n    background: var(--ltsoft); color: var(--fg);\n    display:flex; align-items:center; justify-content:center;\n  }\n  .map-side .bullet .icon .material-icons{ font-size:22px; }\n  .map-side .bullet h5{\n    font-size: 24px; font-weight:600; color:var(--dark); margin:0 0 6px;\n  }\n  .map-side .bullet p{ font-size: 20px; color:var(--ink); line-height:1.4; margin:0; }\n\n  /* ---------- SLIDE 10 — ask ---------- */\n  .ask{\n    background:\n      linear-gradient(180deg, #f8fbfe 0%, #eaf2fb 100%);\n    padding-bottom: 140px;\n  }\n  .ask .ask-grid{\n    display:grid; grid-template-columns: 1.05fr 1fr; gap: 80px; flex:1; align-items:center;\n  }\n  .ask h2{\n    font-size: 76px; line-height:1; color:var(--dark); font-weight:600; margin:0 0 22px; letter-spacing:-.03em;\n  }\n  .ask .lead{\n    font-size: 26px; color: var(--ink); line-height:1.4; margin:0 0 26px; max-width: 740px;\n  }\n  .ask .pillars{\n    display:grid; grid-template-columns: 1fr 1fr; gap: 14px;\n    margin-top: 14px;\n  }\n  .ask .pillar{\n    background:#fff; border:1px solid var(--line); border-radius:14px;\n    padding: 18px 22px;\n  }\n  .ask .pillar .lbl{ font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:var(--fg); font-weight:600; margin-bottom:6px;}\n  .ask .pillar h6{ font-size:20px; color:var(--dark); margin:0; line-height:1.25; font-weight:600; }\n\n  .next-steps{\n    background:#fff; border:1px solid var(--line);\n    border-radius: 20px; padding: 30px 36px;\n    box-shadow: 0 12px 40px rgba(0,64,119,.07);\n  }\n  .next-steps .label{\n    font-size:16px; letter-spacing:.18em; text-transform:uppercase; color:var(--fg);\n    font-weight:600; margin-bottom:16px;\n  }\n  .next-steps ol{\n    list-style:none; counter-reset: ns; padding:0; margin:0;\n    display:flex; flex-direction:column; gap: 14px;\n  }\n  .next-steps ol li{\n    counter-increment: ns;\n    display:grid; grid-template-columns: 44px 1fr; gap: 18px;\n    font-size: 20px; line-height:1.35; color:var(--ink);\n    padding-bottom: 14px;\n    border-bottom:1px solid var(--line);\n  }\n  .next-steps ol li:last-child{ border-bottom:0; padding-bottom:0; }\n  .next-steps ol li::before{\n    content: counter(ns, decimal-leading-zero);\n    font-family:'IBM Plex Mono', monospace;\n    background: var(--dark); color:#fff;\n    width:44px; height:44px; border-radius:10px;\n    display:flex; align-items:center; justify-content:center;\n    font-weight:600; font-size:18px;\n  }\n  .next-steps ol li strong{ color:var(--dark); display:block; margin-bottom:4px; font-weight:600; }\n  .next-steps ol li span{ font-size:18px; color:var(--muted); }\n\n  /* ---------- PSV-SP alignment strip ---------- */\n  .psv-align{\n    display:inline-flex; flex-wrap:wrap; align-items:center; gap:10px;\n    margin-top: 28px;\n    padding: 14px 18px;\n    background: var(--ltsoft);\n    border:1px solid var(--line);\n    border-radius: 12px;\n    max-width: 100%;\n  }\n  .psv-align .lbl{\n    font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted);\n    font-weight:600; white-space:nowrap;\n    padding-right:12px; border-right:1px solid var(--line);\n    margin-right:2px;\n  }\n  .psv-align .code{\n    font-family:'IBM Plex Mono', monospace; font-size:15px;\n    color:var(--dark); font-weight:500;\n    background:#fff; border:1px solid var(--line);\n    border-radius:6px; padding:4px 10px;\n    white-space:nowrap;\n  }\n  .slide.dark .psv-align{ background:rgba(194,224,244,.08); border-color:rgba(194,224,244,.2); }\n  .slide.dark .psv-align .lbl{ color:var(--lt); border-color:rgba(194,224,244,.2); }\n  .slide.dark .psv-align .code{ background:rgba(255,255,255,.06); border-color:rgba(194,224,244,.2); color:#fff; }\n\n  /* utility */\n  .pad-x-tight{ padding-left: 100px; padding-right: 100px; }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\" no-rail=\"\">\n\n  <!-- ============ SLIDE 1 — CAPA ============ -->\n  <section data-label=\"01 Capa\" data-screen-label=\"01 Capa\">\n    <div class=\"slide cover\">\n      <div class=\"grid-bg\"><\u002Fdiv>\n      <div class=\"mark\">\n        <img src=\"https://www.detran.sp.gov.br/702a783633529610cd8381ac4f5c7b5b.iix\" alt=\"Detran-SP\" style=\"height:52px; filter:brightness(0) invert(1); opacity:.9; object-fit:contain;\">\n        <span style=\"width:1px; height:36px; background:rgba(194,224,244,.4);\"><\u002Fspan>\n        Diretoria de Segurança Viária\n      <\u002Fdiv>\n      <h1>Infosiga<span class=\"v\"> 4.0<\u002Fspan><\u002Fh1>\n      <p class=\"tagline\">A plataforma de inteligência em segurança viária do Estado de São Paulo, agora <strong>integrada, preditiva e geoespacial<\u002Fstrong>.<\u002Fp>\n\n      <div class=\"meta\">\n        <div>\n          <span class=\"lbl\">Apresentação<\u002Fspan>\n          <span class=\"val\">Termo de Referência — visão executiva<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <span class=\"lbl\">Para<\u002Fspan>\n          <span class=\"val\">Diretoria de Segurança Viária<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <span class=\"lbl\">Fundamento<\u002Fspan>\n          <span class=\"val\">Decreto 2024 · PSV-SP 2025–2035<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 4 — Mandato legal e estratégico ============ -->\n  <section data-label=\"02 Mandato\" data-screen-label=\"02 Alinhamento Estrategico\">\n    <div class=\"slide paper\">\n      <div class=\"topbar\"><\u002Fdiv>\n      <h2 class=\"title\">Alinhamento Estratégico<\u002Fh2>\n\n      <div class=\"mandate-stack\">\n        <div class=\"mandate-card\">\n          <span class=\"tag\">Base legal<\u002Fspan>\n          <h3>Decreto Estadual nº 68.347/2024<\u002Fh3>\n          <p>Institui o <strong>SISTRAN-SP<\u002Fstrong> e, no Capítulo VI (arts. 22 a 24), define o Infosiga como sistema permanente de gestão da informação de segurança viária do Estado.<\u002Fp>\n          <div class=\"pillar\"><strong>Obrigação direta do Detran-SP<\u002Fstrong> — manter o sistema apto aos atributos definidos no art. 23.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mandate-card\">\n          <span class=\"tag\">Base estratégica<\u002Fspan>\n          <h3>PSV-SP 2025–2035 · Eixo 2<\u002Fh3>\n          <p>O <strong>Eixo 2 — Gestão da Informação<\u002Fstrong> é um dos dois eixos estruturais do Plano e designa expressamente o Infosiga como sistema central de gestão da informação.<\u002Fp>\n          <div class=\"pillar\"><strong>Entregas alinhadas<\u002Fstrong> aos OE 2.1 (governança), OE 2.2 (qualificação e integração) e OE 2.3 (análises e evidências).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <span class=\"brand\">Infosiga 4.0<\u002Fspan>\n        <span>02 / 07<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 5 — Visão: 4 camadas ============ -->\n  <section data-label=\"03 Visao\" data-screen-label=\"03 Visao 4 camadas\">\n    <div class=\"slide\">\n      <div class=\"topbar\"><\u002Fdiv>\n      <h2 class=\"title\" style=\"margin-bottom:32px;\">Infosiga 4.0: quatro camadas<\u002Fh2>\n\n      <div class=\"layers-stage\">\n        <div class=\"layer-card\">\n          <span class=\"lnum\">CAMADA 01<\u002Fspan>\n          <h3>Infraestrutura<\u002Fh3>\n          <p>A fundação automatizada que substitui processos manuais e abre o sistema ao ecossistema.<\u002Fp>\n          <ul class=\"bullets\">\n            <li>Auditoria automática + reprocessamento<\u002Fli>\n            <li>API pública de dados (LGPD, OpenAPI)<\u002Fli>\n            <li>Integração com app RST de campo<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"layer-card\">\n          <span class=\"lnum\">CAMADA 02<\u002Fspan>\n          <h3>Integração de Dados<\u002Fh3>\n          <p>Conecta bases externas, sistemas internos e dados municipais em um repositório unificado.<\u002Fp>\n          <ul class=\"bullets\">\n            <li>Senatran, SES, ARTESP, DER, SMSU<\u002Fli>\n            <li>Intervenções, campanhas e fiscalização<\u002Fli>\n            <li>Relatórios prévios de viabilidade<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"layer-card\">\n          <span class=\"lnum\">CAMADA 03<\u002Fspan>\n          <h3>Análise Preditiva<\u002Fh3>\n          <p>Redes neurais em grafo (GNN) antecipam ocorrência e gravidade por trecho e interseção.<\u002Fp>\n          <ul class=\"bullets\">\n            <li>Grafo viário do Estado de SP<\u002Fli>\n            <li>Risco prospectivo por hora e local<\u002Fli>\n            <li>Variáveis de maior influência preditiva<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"layer-card featured\">\n          <span class=\"lnum\">CAMADA 04<\u002Fspan>\n          <h3>Mapa Interativo<\u002Fh3>\n          <p>A interface central onde tudo converge — sinistros, vias, pessoas, veículos e intervenções.<\u002Fp>\n          <ul class=\"bullets\">\n            <li>5 escalas geográficas navegáveis<\u002Fli>\n            <li>Camadas ativáveis e painéis dinâmicos<\u002Fli>\n            <li>Trechos e interseções críticos<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"flow-strip\">\n        <span class=\"step\">Dados<\u002Fspan><span class=\"arr\">→<\u002Fspan>\n        <span class=\"step\">Informação<\u002Fspan><span class=\"arr\">→<\u002Fspan>\n        <span class=\"step\">Decisão<\u002Fspan><span class=\"arr\">→<\u002Fspan>\n        <span class=\"step\">Planejamento<\u002Fspan><span class=\"arr\">→<\u002Fspan>\n        <span class=\"step\">Monitoramento<\u002Fspan><span class=\"arr\">→<\u002Fspan>\n        <span class=\"step\">Comunicação<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <span class=\"brand\">Infosiga 4.0<\u002Fspan>\n        <span>03 / 07<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 6 — Camada 1 ============ -->\n  <section data-label=\"04 Camada 1\" data-screen-label=\"04 Camada 1 Infraestrutura\">\n    <div class=\"slide\">\n      <div class=\"topbar\"><\u002Fdiv>\n\n      <div class=\"layer-hero\">\n        <div class=\"sidemark\">\n          <span class=\"num\">CAMADA 01<\u002Fspan>\n          <h2>Infraestrutura<\u002Fh2>\n          <p>Eliminar o gargalo manual, padronizar a qualidade dos dados e abrir o Infosiga ao ecossistema público — preparando o terreno para todas as camadas seguintes.<\u002Fp>\n          <div class=\"psv-align\">\n            <span class=\"lbl\">PSV-SP<\u002Fspan>\n            <span class=\"code\">2.3.1.4<\u002Fspan>\n            <span class=\"code\">2.1.4.1<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <ul class=\"deliv-list\">\n          <li class=\"deliv\">\n            <div class=\"dn\">1.1<\u002Fdiv>\n            <div>\n              <h4>Otimização de processos<\u002Fh4>\n              <p>Novo módulo de back-end com auditoria automática, detecção de divergências, reprocessamento de sinistros e rastreabilidade do boletim de origem de cada vítima — preservando ilesos e feridos hoje subnotificados.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fli>\n          <li class=\"deliv\">\n            <div class=\"dn\">1.2<\u002Fdiv>\n            <div>\n              <h4>API pública de dados do Infosiga<\u002Fh4>\n              <p>Endpoints documentados (OpenAPI/Swagger) para sinistros, pessoas e veículos, autenticação por token, em conformidade com LGPD e padrões SGGD — integrada ao portal de dados abertos.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fli>\n          <li class=\"deliv\">\n            <div class=\"dn\">1.3<\u002Fdiv>\n            <div>\n              <h4>Integração com o app RST<\u002Fh4>\n              <p>Recepção automática, sincronização contínua e atualização dinâmica dos registros realizados em campo pelos agentes — sem intervenção manual, com protocolos de segurança e LGPD.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <span class=\"brand\">Infosiga 4.0<\u002Fspan>\n        <span>04 / 07<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 7 — Camada 2 ============ -->\n  <section data-label=\"05 Camada 2\" data-screen-label=\"05 Camada 2 Integracao\">\n    <div class=\"slide paper\">\n      <div class=\"topbar\"><\u002Fdiv>\n      <p class=\"mono\" style=\"color:var(--muted); font-size:22px; letter-spacing:.1em; margin:0 0 12px; font-weight:500;\">CAMADA 02<\u002Fp>\n      <h2 class=\"title\" style=\"font-size:56px; margin-bottom:16px;\">Integração de Dados<\u002Fh2>\n      <div class=\"psv-align\" style=\"margin-bottom:22px;\">\n        <span class=\"lbl\">PSV-SP<\u002Fspan>\n        <span class=\"code\">2.2.1.1<\u002Fspan>\n        <span class=\"code\">2.2.1.2<\u002Fspan>\n        <span class=\"code\">2.2.1.3<\u002Fspan>\n        <span class=\"code\">2.2.1.4<\u002Fspan>\n 002Fspan>\n            <span class=\"src\"><span class=\"acronym\">FISCALIZAÇÃO<\u002Fspan><small>operações coordenadas pela DFT<\u002Fsmall><\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin-top:16px; font-size:18px; color:rgba(255,255,255,.75); line-height:1.5;\">Cadastro autenticado para órgãos externos. Cada intervenção vira camada no Mapa Interativo — correlacionando ação e sinistralidade.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"block\" style=\"grid-column: 1 / -1;\">\n          <h4 style=\"margin-bottom:12px;\">Saída esperada<\u002Fh4>\n          <p style=\"font-size:22px; color:var(--ink); line-height:1.4; margin:0; max-width:1500px;\">\n            Repositório unificado de <strong>sinistros, vias, pessoas, veículos e intervenções<\u002Fstrong> — base sobre a qual operam a análise preditiva (Camada 3) e o mapa interativo (Camada 4). Os dados geoespaciais serão publicados na <strong>INDE<\u002Fstrong> (serviços WFS/WMS, metadados MGB), ampliando a interoperabilidade nacional.\n          <\u002Fp>\n          <p style=\"font-size:16px; color:var(--muted); margin-top:14px; letter-spacing:.04em;\"><strong style=\"color:var(--dark);\">ALINHAMENTO PSV-SP:<\u002Fstrong> produtos 2.1.1.2 · 2.2.1.1 · 2.2.1.2 · 2.2.1.3 · 2.2.1.4 · 2.2.1.5 · 2.2.1.6 · 2.2.1.7<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <span class=\"brand\">Infosiga 4.0<\u002Fspan>\n        <span>05 / 07<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 8 — Camada 3 ============ -->\n  <section data-label=\"06 Camada 3\" data-screen-label=\"06 Camada 3 Preditiva\">\n    <div class=\"slide\">\n      <div class=\"topbar\"><\u002Fdiv>\n\n      <div class=\"pred-stage\">\n        <div class=\"pred-text\">\n          <span class=\"mono\" style=\"color:var(--muted); letter-spacing:.08em; font-weight:500;\">CAMADA 03 — ANÁLISE PREDITIVA<\u002Fspan>\n          <h3 style=\"margin-top:18px;\">Do
